name: Deploy to SCF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tencent Cloud SDK
        run: pip install tencentcloud-sdk-python-scf

      - name: Deploy to SCF
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: python scripts/deploy_scf.py

      - name: Health check
        run: |
          sleep 5
          FUNCTION_URL=$(python -c "import json; cfg=json.load(open('.scf-deploy.json')); print(cfg.get('access_url', 'https://1256784020-' + cfg['function_name'] + '.ap-guangzhou.tencentscf.com'))")
          echo "Checking $FUNCTION_URL"
          curl -sf -o /dev/null -w "HTTP %{http_code}" "$FUNCTION_URL" || echo " (may need warm-up)"
